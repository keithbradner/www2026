<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Photo — What Women Want</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/shared/theme.css" />
  <link rel="stylesheet" href="/src/photo/photo.css" />
</head>
<body class="page-photo">
  <main class="photo-shell">
    <header class="photo-header">
      <div class="kicker">What Women Want · 2026</div>
      <h1>Your photo</h1>
    </header>

    <div class="photo-card" id="photo-card">
      <img id="photo-img" alt="Your photobooth portrait" />
      <div class="photo-loading" id="photo-loading">Loading…</div>
    </div>

    <div class="photo-actions">
      <button class="btn-primary" id="btn-save">Save Photo</button>
      <button class="btn-secondary" id="btn-share">Share</button>
    </div>

    <footer class="photo-footer">Come back to the booth to take another.</footer>
  </main>

  <script type="module" src="/src/photo/photo.js"></script>
</body>
</html>

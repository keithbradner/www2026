<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>What Women Want — Auction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Permanent+Marker&family=Staatliches&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/shared/theme.css" />
  <link rel="stylesheet" href="/src/shared/nav.css" />
  <link rel="stylesheet" href="/src/auction/carousel.css" />
</head>
<body class="page-auction">
  <div id="top-nav"></div>

  <main class="carousel" id="carousel">
    <div class="page-decor" aria-hidden="true">
      <div class="decor-star decor-star-1">★</div>
      <div class="decor-star decor-star-2">★</div>
      <div class="decor-star decor-star-3">✦</div>
      <div class="decor-heart decor-heart-1">♥</div>
      <div class="decor-heart decor-heart-2">♥</div>
      <div class="decor-scribble scribble-1">omg 😍</div>
      <div class="decor-scribble scribble-2">WIN ME!</div>
      <div class="decor-scribble scribble-3">~ BFF ~</div>
    </div>

    <section class="carousel-meta" id="carousel-meta">
      <h1 class="item-title" id="item-title"></h1>
      <img class="title-squiggle" src="/decor/squiggle.svg" alt="" aria-hidden="true" />
      <div class="item-description-wrap">
        <p class="item-description" id="item-description"></p>
      </div>
    </section>

    <div class="carousel-stage" id="carousel-stage">
      <!-- Collage slots populated by carousel.js -->
      <div class="collage-slot slot-1" data-slot="1"></div>
      <div class="collage-slot slot-2" data-slot="2"></div>
      <div class="collage-slot slot-3" data-slot="3"></div>
      <div class="collage-slot slot-4" data-slot="4"></div>
    </div>

    <nav class="carousel-controls">
      <button class="nav-arrow nav-prev" id="nav-prev" aria-label="Previous">‹</button>
      <div class="pager" id="pager"></div>
      <button class="nav-arrow nav-next" id="nav-next" aria-label="Next">›</button>
    </nav>

    <div class="carousel-empty hidden" id="carousel-empty">
      <p>No auction items yet.</p>
      <p class="hint">Add items at <code>/admin</code>.</p>
    </div>
  </main>

  <script type="module" src="/src/auction/carousel.js"></script>
</body>
</html>

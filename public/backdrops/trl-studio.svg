<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="trlWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3fa4"/>
      <stop offset="0.45" stop-color="#8b4cd6"/>
      <stop offset="1" stop-color="#2a1a38"/>
    </linearGradient>
    <linearGradient id="trlSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e22"/>
      <stop offset="0.55" stop-color="#2a1a38"/>
      <stop offset="1" stop-color="#5e2fa3"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff90c2"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e01f88"/>
    </linearGradient>
    <pattern id="trlStars" x="0" y="0" width="130" height="130" patternUnits="userSpaceOnUse">
      <path d="M30 22 L36 40 L54 42 L40 54 L46 72 L30 62 L14 72 L20 54 L6 42 L24 40 Z" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.5" opacity="0.7"/>
      <circle cx="100" cy="100" r="3" fill="#ff90c2" opacity="0.7"/>
      <circle cx="110" cy="40" r="2" fill="#5ec8ff" opacity="0.85"/>
      <circle cx="60" cy="110" r="2" fill="#fff" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Studio wall bg -->
  <rect width="800" height="1000" fill="url(#trlWall)"/>
  <rect width="800" height="1000" fill="url(#trlStars)" opacity="0.5"/>

  <!-- Top marquee band -->
  <g>
    <rect x="0" y="0" width="800" height="66" fill="#1a0e22"/>
    <rect x="0" y="60" width="800" height="6" fill="#ff3fa4"/>
    <text x="400" y="44" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="36" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.5" paint-order="stroke" letter-spacing="3">★ TRL LIVE · TIMES SQUARE · NO. 1 THIS WEEK ★</text>
  </g>

  <!-- STUDIO WINDOW — Times Square by night -->
  <g transform="translate(280 90)">
    <!-- Window frame + glass -->
    <rect x="-6" y="-6" width="512" height="352" fill="#1a0e22" rx="6"/>
    <rect x="0" y="0" width="500" height="340" fill="url(#trlSky)" stroke="#ffe66d" stroke-width="4" rx="4"/>
    <!-- Star speckle in sky -->
    <g fill="#ffffff" opacity="0.8">
      <circle cx="40" cy="30" r="1.5"/><circle cx="90" cy="58" r="1"/><circle cx="150" cy="22" r="1.5"/><circle cx="210" cy="48" r="1"/><circle cx="280" cy="20" r="1.5"/><circle cx="340" cy="50" r="1"/><circle cx="400" cy="25" r="1.5"/><circle cx="460" cy="55" r="1"/>
    </g>
    <!-- Distant building silhouettes -->
    <g fill="#0a0614">
      <rect x="0" y="130" width="60" height="210"/>
      <rect x="55" y="90" width="50" height="250"/>
      <rect x="100" y="150" width="40" height="190"/>
      <rect x="135" y="70" width="58" height="270"/>
      <rect x="190" y="110" width="46" height="230"/>
      <rect x="230" y="50" width="60" height="290"/>
      <rect x="285" y="130" width="40" height="210"/>
      <rect x="320" y="90" width="52" height="250"/>
      <rect x="368" y="140" width="44" height="200"/>
      <rect x="408" y="80" width="56" height="260"/>
      <rect x="460" y="130" width="40" height="210"/>
    </g>
    <!-- Tiny lit windows on buildings -->
    <g fill="#ffe66d" opacity="0.9">
      <rect x="10" y="150" width="5" height="5"/><rect x="20" y="170" width="5" height="5"/><rect x="35" y="190" width="5" height="5"/><rect x="12" y="230" width="5" height="5"/><rect x="30" y="260" width="5" height="5"/>
      <rect x="65" y="110" width="5" height="5"/><rect x="80" y="140" width="5" height="5"/><rect x="70" y="200" width="5" height="5"/><rect x="88" y="240" width="5" height="5"/>
      <rect x="145" y="90" width="5" height="5"/><rect x="165" y="120" width="5" height="5"/><rect x="150" y="160" width="5" height="5"/><rect x="180" y="200" width="5" height="5"/><rect x="160" y="260" width="5" height="5"/>
      <rect x="240" y="70" width="5" height="5"/><rect x="260" y="100" width="5" height="5"/><rect x="245" y="150" width="5" height="5"/><rect x="275" y="210" width="5" height="5"/>
      <rect x="330" y="110" width="5" height="5"/><rect x="350" y="140" width="5" height="5"/><rect x="340" y="200" width="5" height="5"/>
      <rect x="420" y="100" width="5" height="5"/><rect x="440" y="150" width="5" height="5"/><rect x="425" y="220" width="5" height="5"/>
    </g>
    <!-- Neon billboard: POP ★ -->
    <g transform="translate(40 150)">
      <rect x="0" y="0" width="130" height="52" fill="#ff3fa4" stroke="#ffe66d" stroke-width="3" rx="4"/>
      <text x="65" y="36" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="26" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.5" paint-order="stroke">POP ★</text>
    </g>
    <!-- Neon billboard: MEGA -->
    <g transform="translate(310 110)">
      <rect x="0" y="0" width="150" height="64" fill="#5ec8ff" stroke="#ff3fa4" stroke-width="3" rx="4"/>
      <text x="75" y="26" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="14" fill="#1a0e22" letter-spacing="4">MEGASTORE</text>
      <text x="75" y="54" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="24" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1.2" paint-order="stroke">TODAY ONLY!</text>
    </g>
    <!-- Scrolling ticker at bottom of window -->
    <rect x="0" y="298" width="500" height="42" fill="#1a0e22"/>
    <text x="20" y="326" font-family="Staatliches, Impact, sans-serif" font-size="22" fill="#c6ff3a" letter-spacing="4">NYSE ★ POP +12 · MTV +7 · HITS +9 · FAN +99</text>
    <!-- Yellow cab in street -->
    <g transform="translate(80 268)">
      <rect x="0" y="8" width="60" height="22" fill="#ffe66d" stroke="#1a0e22" stroke-width="2" rx="3"/>
      <rect x="8" y="0" width="40" height="12" fill="#ffe66d" stroke="#1a0e22" stroke-width="2"/>
      <text x="30" y="24" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="11" fill="#1a0e22">CAB</text>
      <circle cx="14" cy="30" r="6" fill="#1a0e22"/>
      <circle cx="46" cy="30" r="6" fill="#1a0e22"/>
    </g>
    <!-- Moon -->
    <circle cx="450" cy="40" r="16" fill="#fff4e6" stroke="#1a0e22" stroke-width="1.5"/>
    <circle cx="445" cy="38" r="3" fill="#d7d9e6" opacity="0.7"/>
    <circle cx="453" cy="45" r="2" fill="#d7d9e6" opacity="0.7"/>
  </g>

  <!-- "ON AIR" sign top-left -->
  <g transform="translate(40 100)">
    <rect x="0" y="0" width="180" height="54" fill="#1a0e22" stroke="#ff3fa4" stroke-width="4" rx="6"/>
    <rect x="6" y="6" width="168" height="42" fill="#ff3fa4" opacity="0.2"/>
    <text x="90" y="36" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="28" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1" paint-order="stroke">● ON AIR</text>
  </g>

  <!-- TOP 10 chart panel on left -->
  <g transform="translate(30 180)">
    <rect x="0" y="0" width="220" height="360" fill="#1a0e22" stroke="#ffe66d" stroke-width="3" rx="8"/>
    <rect x="8" y="8" width="204" height="32" fill="#ff3fa4"/>
    <text x="110" y="30" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="20" fill="#ffe66d" stroke="#1a0e22" stroke-width="1" paint-order="stroke">TOP 10 COUNTDOWN</text>
    <!-- 10 bars -->
    <g font-family="Staatliches, Impact, sans-serif" font-size="13">
      <g transform="translate(12 50)"><text x="0" y="11" fill="#ffe66d">#1</text><rect x="22" y="0" width="186" height="14" fill="#ffe66d" stroke="#fff" stroke-width="1"/><text x="34" y="11" fill="#1a0e22">WHAT WOMEN WANT</text></g>
      <g transform="translate(12 70)"><text x="0" y="11" fill="#ff90c2">#2</text><rect x="22" y="0" width="168" height="14" fill="#ff90c2"/></g>
      <g transform="translate(12 90)"><text x="0" y="11" fill="#ff90c2">#3</text><rect x="22" y="0" width="154" height="14" fill="#ff90c2"/></g>
      <g transform="translate(12 110)"><text x="0" y="11" fill="#5ec8ff">#4</text><rect x="22" y="0" width="142" height="14" fill="#5ec8ff"/></g>
      <g transform="translate(12 130)"><text x="0" y="11" fill="#5ec8ff">#5</text><rect x="22" y="0" width="128" height="14" fill="#5ec8ff"/></g>
      <g transform="translate(12 150)"><text x="0" y="11" fill="#c6ff3a">#6</text><rect x="22" y="0" width="116" height="14" fill="#c6ff3a"/></g>
      <g transform="translate(12 170)"><text x="0" y="11" fill="#c6ff3a">#7</text><rect x="22" y="0" width="100" height="14" fill="#c6ff3a"/></g>
      <g transform="translate(12 190)"><text x="0" y="11" fill="#ffe66d">#8</text><rect x="22" y="0" width="88" height="14" fill="#ffe66d"/></g>
      <g transform="translate(12 210)"><text x="0" y="11" fill="#ffe66d">#9</text><rect x="22" y="0" width="72" height="14" fill="#ffe66d"/></g>
      <g transform="translate(12 230)"><text x="0" y="11" fill="#d7d9e6">#10</text><rect x="22" y="0" width="58" height="14" fill="#d7d9e6"/></g>
    </g>
    <!-- Phone icon + callers waiting -->
    <g transform="translate(8 270)">
      <rect x="0" y="0" width="204" height="82" fill="#2a1a38" stroke="#ff3fa4" stroke-width="2" rx="4"/>
      <text x="102" y="24" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="14" fill="#c6ff3a" letter-spacing="3">☎ CALLERS WAITING</text>
      <text x="102" y="54" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="30" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.2" paint-order="stroke">2,439</text>
      <text x="102" y="74" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="12" fill="#ff90c2" letter-spacing="4">1-800-TRL-VOTE</text>
    </g>
  </g>

  <!-- Boom mic swinging in from upper right -->
  <g transform="translate(620 70) rotate(22)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#3d4057" stroke-width="8"/>
    <line x1="0" y1="0" x2="180" y2="0" stroke="#8c90a6" stroke-width="3"/>
    <rect x="175" y="-14" width="34" height="28" fill="#3d4057" stroke="#1a0e22" stroke-width="2" rx="3"/>
    <ellipse cx="228" cy="0" rx="28" ry="18" fill="url(#chrome)" stroke="#1a0e22" stroke-width="2.5"/>
    <g stroke="#1a0e22" stroke-width="1.2" fill="none">
      <line x1="204" y1="-10" x2="250" y2="-10"/><line x1="202" y1="-4" x2="252" y2="-4"/><line x1="202" y1="2" x2="252" y2="2"/><line x1="204" y1="8" x2="250" y2="8"/>
    </g>
  </g>

  <!-- Balloon bunch, top left against wall -->
  <g transform="translate(540 430)">
    <line x1="20" y1="0" x2="0" y2="110" stroke="#1a0e22" stroke-width="1.5"/>
    <line x1="50" y1="0" x2="38" y2="110" stroke="#1a0e22" stroke-width="1.5"/>
    <line x1="80" y1="0" x2="72" y2="110" stroke="#1a0e22" stroke-width="1.5"/>
    <ellipse cx="20" cy="-18" rx="20" ry="24" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2"/>
    <ellipse cx="54" cy="-26" rx="20" ry="24" fill="#ffe66d" stroke="#1a0e22" stroke-width="2"/>
    <ellipse cx="86" cy="-12" rx="20" ry="24" fill="#5ec8ff" stroke="#1a0e22" stroke-width="2"/>
    <ellipse cx="14" cy="-26" rx="5" ry="3" fill="#fff" opacity="0.6"/>
    <ellipse cx="48" cy="-34" rx="5" ry="3" fill="#fff" opacity="0.6"/>
    <ellipse cx="80" cy="-20" rx="5" ry="3" fill="#fff" opacity="0.6"/>
  </g>

  <!-- Studio floor crosses + gaff tape -->
  <g transform="translate(0 780)">
    <rect x="0" y="0" width="800" height="220" fill="#2a1a38"/>
    <rect x="0" y="0" width="800" height="4" fill="#ff3fa4"/>
    <g fill="#ffe66d" opacity="0.85">
      <rect x="380" y="20" width="40" height="6"/>
      <rect x="394" y="6" width="12" height="34"/>
    </g>
  </g>

  <!-- Studio camera bottom-left foreground -->
  <g transform="translate(30 740)">
    <!-- Tripod legs -->
    <g stroke="#1a0e22" stroke-width="4">
      <line x1="60" y1="120" x2="10" y2="260"/>
      <line x1="60" y1="120" x2="60" y2="260"/>
      <line x1="60" y1="120" x2="115" y2="260"/>
    </g>
    <circle cx="60" cy="120" r="10" fill="#3d4057" stroke="#1a0e22" stroke-width="2"/>
    <!-- Camera body -->
    <rect x="0" y="40" width="140" height="90" fill="#3d4057" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <rect x="0" y="40" width="140" height="10" fill="#8c90a6"/>
    <!-- Lens -->
    <g transform="translate(140 65)">
      <rect x="0" y="0" width="50" height="40" fill="#1a0e22" stroke="#1a0e22" stroke-width="2"/>
      <circle cx="50" cy="20" r="22" fill="#1a0e22" stroke="#8c90a6" stroke-width="3"/>
      <circle cx="50" cy="20" r="16" fill="#3d4057"/>
      <circle cx="50" cy="20" r="9" fill="#1a0e22"/>
      <circle cx="44" cy="14" r="3" fill="#5ec8ff" opacity="0.9"/>
    </g>
    <!-- Viewfinder -->
    <rect x="24" y="10" width="52" height="34" fill="#1a0e22" stroke="#8c90a6" stroke-width="2"/>
    <!-- REC light -->
    <circle cx="12" cy="56" r="6" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2"/>
    <text x="22" y="60" font-family="Staatliches, Impact, sans-serif" font-size="12" fill="#ff3fa4" letter-spacing="2">REC</text>
    <!-- MTV-style logo on side -->
    <text x="50" y="110" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="22" fill="#ffe66d" stroke="#1a0e22" stroke-width="1" paint-order="stroke">TRL</text>
  </g>
</svg>

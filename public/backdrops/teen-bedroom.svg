<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd6e7"/>
      <stop offset="1" stop-color="#ff90c2"/>
    </linearGradient>
    <linearGradient id="lava" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd6e7"/>
      <stop offset="1" stop-color="#ff3fa4"/>
    </linearGradient>
    <linearGradient id="duvet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3fa4"/>
      <stop offset="1" stop-color="#e01f88"/>
    </linearGradient>
    <pattern id="hearts" x="0" y="0" width="90" height="90" patternUnits="userSpaceOnUse">
      <path d="M45 30 C 30 14 34 -4 48 -4 C 54 -4 58 2 58 8 C 58 2 62 -4 70 -4 C 84 -4 88 14 73 30 L 58 44 Z" fill="#ff3fa4" opacity="0.22"/>
      <circle cx="10" cy="58" r="3" fill="#ff3fa4" opacity="0.18"/>
      <circle cx="80" cy="72" r="3" fill="#ff3fa4" opacity="0.18"/>
    </pattern>
    <pattern id="corkboard" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#c8a24a"/>
      <circle cx="3" cy="3" r="0.8" fill="#7a5a26" opacity="0.5"/>
    </pattern>
    <pattern id="rugSwirl" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#ff90c2"/>
      <circle cx="40" cy="40" r="24" fill="none" stroke="#5ec8ff" stroke-width="5"/>
      <circle cx="40" cy="40" r="12" fill="none" stroke="#ffe66d" stroke-width="4"/>
      <circle cx="40" cy="40" r="4" fill="#8b4cd6"/>
    </pattern>
  </defs>

  <!-- Wallpaper -->
  <rect width="800" height="1000" fill="url(#wallpaper)"/>
  <rect width="800" height="1000" fill="url(#hearts)"/>

  <!-- Crown moulding top -->
  <rect y="0" width="800" height="22" fill="#fff4e6" stroke="#1a0e22" stroke-width="2"/>
  <rect y="22" width="800" height="6" fill="#f3e2c8"/>

  <!-- FAIRY LIGHT GARLAND -->
  <g>
    <path d="M 0 80 Q 100 160 200 80 T 400 80 T 600 80 T 800 80" stroke="#1a0e22" stroke-width="2" fill="none" opacity="0.7"/>
    <g stroke="#1a0e22" stroke-width="1.5">
      <g fill="#ffe66d"><ellipse cx="50" cy="110" rx="6" ry="8"/><ellipse cx="250" cy="110" rx="6" ry="8"/><ellipse cx="450" cy="110" rx="6" ry="8"/><ellipse cx="650" cy="110" rx="6" ry="8"/></g>
      <g fill="#5ec8ff"><ellipse cx="100" cy="128" rx="6" ry="8"/><ellipse cx="300" cy="128" rx="6" ry="8"/><ellipse cx="500" cy="128" rx="6" ry="8"/><ellipse cx="700" cy="128" rx="6" ry="8"/></g>
      <g fill="#ff3fa4"><ellipse cx="150" cy="132" rx="6" ry="8"/><ellipse cx="350" cy="132" rx="6" ry="8"/><ellipse cx="550" cy="132" rx="6" ry="8"/><ellipse cx="750" cy="132" rx="6" ry="8"/></g>
      <g fill="#c6ff3a"><ellipse cx="200" cy="96" rx="6" ry="8"/><ellipse cx="400" cy="96" rx="6" ry="8"/><ellipse cx="600" cy="96" rx="6" ry="8"/></g>
    </g>
    <!-- Light halos -->
    <g opacity="0.35">
      <circle cx="50" cy="110" r="16" fill="#ffe66d"/><circle cx="250" cy="110" r="16" fill="#ffe66d"/><circle cx="450" cy="110" r="16" fill="#ffe66d"/><circle cx="650" cy="110" r="16" fill="#ffe66d"/>
    </g>
  </g>

  <!-- MAGAZINE WALL COLLAGE — left side -->
  <g>
    <!-- Big boy band poster -->
    <g transform="translate(18 160) rotate(-3)">
      <rect x="-4" y="-4" width="248" height="328" fill="#1a0e22"/>
      <rect x="0" y="0" width="240" height="320" fill="#ff3fa4"/>
      <text x="120" y="38" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="26" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.2" paint-order="stroke">THE BOYS</text>
      <!-- 4 portrait circles -->
      <g stroke="#1a0e22" stroke-width="2.5">
        <circle cx="62" cy="120" r="32" fill="#ffe66d"/>
        <circle cx="178" cy="120" r="32" fill="#5ec8ff"/>
        <circle cx="62" cy="200" r="32" fill="#c6ff3a"/>
        <circle cx="178" cy="200" r="32" fill="#ff90c2"/>
      </g>
      <!-- Simple face doodles -->
      <g stroke="#1a0e22" stroke-width="2" fill="none">
        <circle cx="55" cy="116" r="2" fill="#1a0e22"/><circle cx="69" cy="116" r="2" fill="#1a0e22"/>
        <circle cx="171" cy="116" r="2" fill="#1a0e22"/><circle cx="185" cy="116" r="2" fill="#1a0e22"/>
        <circle cx="55" cy="196" r="2" fill="#1a0e22"/><circle cx="69" cy="196" r="2" fill="#1a0e22"/>
        <circle cx="171" cy="196" r="2" fill="#1a0e22"/><circle cx="185" cy="196" r="2" fill="#1a0e22"/>
        <path d="M52 130 Q 62 136 72 130"/><path d="M168 130 Q 178 136 188 130"/><path d="M52 210 Q 62 216 72 210"/><path d="M168 210 Q 178 216 188 210"/>
      </g>
      <text x="120" y="272" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="18" fill="#fff" letter-spacing="3">WORLD TOUR ’99</text>
      <text x="120" y="298" text-anchor="middle" font-family="Caveat, cursive" font-size="22" fill="#ffe66d">♥ i love u 4evr ♥</text>
      <!-- Tape corners -->
      <rect x="-14" y="-12" width="40" height="14" fill="#ffe66d" opacity="0.8" transform="rotate(-22 -14 -12)"/>
      <rect x="208" y="-18" width="40" height="14" fill="#ffe66d" opacity="0.8" transform="rotate(18 208 -18)"/>
    </g>
    <!-- Magazine cutout 2 — lyric -->
    <g transform="translate(22 510) rotate(5)">
      <rect x="0" y="0" width="180" height="68" fill="#fff4e6" stroke="#1a0e22" stroke-width="1.5"/>
      <text x="90" y="28" text-anchor="middle" font-family="Caveat, cursive" font-size="22" fill="#1a0e22">"quit playin games</text>
      <text x="90" y="54" text-anchor="middle" font-family="Caveat, cursive" font-size="22" fill="#e01f88">with my heart ♥"</text>
      <rect x="70" y="-8" width="40" height="12" fill="#5ec8ff" opacity="0.8"/>
    </g>
    <!-- Photo strip -->
    <g transform="translate(200 520) rotate(-6)">
      <rect x="-4" y="-4" width="82" height="218" fill="#1a0e22"/>
      <rect x="0" y="0" width="74" height="210" fill="#fff"/>
      <rect x="6" y="6" width="62" height="44" fill="#ff90c2"/>
      <rect x="6" y="54" width="62" height="44" fill="#5ec8ff"/>
      <rect x="6" y="102" width="62" height="44" fill="#ffe66d"/>
      <rect x="6" y="150" width="62" height="44" fill="#c6ff3a"/>
      <!-- little faces -->
      <g fill="#1a0e22">
        <circle cx="32" cy="28" r="2"/><circle cx="42" cy="28" r="2"/>
        <circle cx="32" cy="76" r="2"/><circle cx="42" cy="76" r="2"/>
        <circle cx="32" cy="124" r="2"/><circle cx="42" cy="124" r="2"/>
        <circle cx="32" cy="172" r="2"/><circle cx="42" cy="172" r="2"/>
      </g>
      <g stroke="#1a0e22" stroke-width="1.5" fill="none">
        <path d="M30 34 Q 37 38 44 34"/><path d="M30 82 Q 37 86 44 82"/><path d="M30 130 Q 37 134 44 130"/><path d="M30 178 Q 37 182 44 178"/>
      </g>
    </g>
  </g>

  <!-- CORKBOARD on right side -->
  <g transform="translate(540 170)">
    <rect x="-8" y="-8" width="256" height="406" fill="#7a5a26" rx="4"/>
    <rect x="-2" y="-2" width="244" height="394" fill="url(#corkboard)"/>
    <rect x="-2" y="-2" width="244" height="394" fill="none" stroke="#1a0e22" stroke-width="4"/>
    <!-- Concert ticket stub -->
    <g transform="translate(20 16) rotate(-4)">
      <rect x="0" y="0" width="180" height="48" fill="#ffe66d" stroke="#1a0e22" stroke-width="2"/>
      <path d="M130 0 L130 48" stroke="#1a0e22" stroke-width="1.5" stroke-dasharray="3 3"/>
      <text x="10" y="22" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="16" fill="#1a0e22">WORLD TOUR</text>
      <text x="10" y="40" font-family="Staatliches, Impact, sans-serif" font-size="11" fill="#1a0e22" letter-spacing="2">ROW A · SEAT 1</text>
      <text x="155" y="32" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="22" fill="#ff3fa4">01</text>
      <!-- Pushpin -->
      <circle cx="16" cy="-2" r="5" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1.2"/>
    </g>
    <!-- Polaroid -->
    <g transform="translate(40 90) rotate(8)">
      <rect x="-4" y="-4" width="126" height="158" fill="#1a0e22"/>
      <rect x="0" y="0" width="118" height="150" fill="#fff"/>
      <rect x="8" y="8" width="102" height="102" fill="#5ec8ff"/>
      <circle cx="59" cy="60" r="26" fill="#ffe66d"/>
      <g fill="#1a0e22"><circle cx="52" cy="56" r="2"/><circle cx="66" cy="56" r="2"/></g>
      <path d="M50 68 Q 59 74 68 68" stroke="#1a0e22" stroke-width="1.5" fill="none"/>
      <text x="59" y="130" text-anchor="middle" font-family="Caveat, cursive" font-size="18" fill="#1a0e22">me + BFF ’99</text>
      <circle cx="4" cy="-2" r="5" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.2"/>
    </g>
    <!-- Mixtape cassette -->
    <g transform="translate(160 124) rotate(-8)">
      <rect x="0" y="0" width="80" height="54" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2" rx="2"/>
      <rect x="6" y="6" width="68" height="18" fill="#fff4e6" stroke="#1a0e22" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="Caveat, cursive" font-size="13" fill="#1a0e22">Mix #7 ♥</text>
      <circle cx="22" cy="38" r="6" fill="#1a0e22"/><circle cx="22" cy="38" r="2" fill="#ffe66d"/>
      <circle cx="58" cy="38" r="6" fill="#1a0e22"/><circle cx="58" cy="38" r="2" fill="#ffe66d"/>
      <circle cx="74" cy="-2" r="5" fill="#5ec8ff" stroke="#1a0e22" stroke-width="1.2"/>
    </g>
    <!-- Friendship bracelet -->
    <g transform="translate(30 266)">
      <path d="M0 10 Q 90 -10 180 10" stroke="#1a0e22" stroke-width="1.5" fill="none"/>
      <g>
        <circle cx="10" cy="10" r="7" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="30" cy="6" r="7" fill="#ffe66d" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="50" cy="3" r="7" fill="#5ec8ff" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="70" cy="1" r="7" fill="#c6ff3a" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="90" cy="0" r="7" fill="#ff90c2" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="110" cy="1" r="7" fill="#8b4cd6" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="130" cy="3" r="7" fill="#ffe66d" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="150" cy="6" r="7" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1"/>
        <circle cx="170" cy="10" r="7" fill="#5ec8ff" stroke="#1a0e22" stroke-width="1"/>
        <text x="10" y="13" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-size="7" fill="#1a0e22">B</text>
        <text x="30" y="9" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-size="7" fill="#1a0e22">F</text>
        <text x="50" y="6" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-size="7" fill="#1a0e22">F</text>
      </g>
    </g>
    <!-- Sticker sheet -->
    <g transform="translate(130 300) rotate(7)">
      <rect x="0" y="0" width="100" height="78" fill="#fff4e6" stroke="#1a0e22" stroke-width="2" rx="4"/>
      <g stroke="#1a0e22" stroke-width="1.2">
        <path d="M18 14 L22 22 L30 24 L24 30 L26 38 L18 34 L10 38 L12 30 L6 24 L14 22 Z" fill="#ffe66d"/>
        <circle cx="50" cy="22" r="10" fill="#ff3fa4"/>
        <path d="M82 18 C 72 10 76 -2 86 -2 C 90 -2 92 2 92 6 C 92 2 94 -2 98 -2 C 108 -2 112 10 102 18 L 92 26 Z" fill="#ff90c2"/>
        <rect x="14" y="48" width="22" height="22" fill="#5ec8ff" rx="11"/>
        <rect x="46" y="48" width="26" height="22" fill="#c6ff3a" rx="4"/>
        <circle cx="88" cy="60" r="10" fill="#ffe66d"/>
      </g>
    </g>
  </g>

  <!-- HEADBOARD (upholstered) -->
  <g>
    <rect x="120" y="600" width="560" height="160" fill="#ff90c2" stroke="#1a0e22" stroke-width="4" rx="18"/>
    <!-- Tufted button pattern -->
    <g fill="#ff3fa4" stroke="#1a0e22" stroke-width="1.2">
      <circle cx="180" cy="650" r="5"/><circle cx="260" cy="650" r="5"/><circle cx="340" cy="650" r="5"/><circle cx="420" cy="650" r="5"/><circle cx="500" cy="650" r="5"/><circle cx="580" cy="650" r="5"/><circle cx="220" cy="710" r="5"/><circle cx="300" cy="710" r="5"/><circle cx="380" cy="710" r="5"/><circle cx="460" cy="710" r="5"/><circle cx="540" cy="710" r="5"/><circle cx="620" cy="710" r="5"/>
    </g>
  </g>

  <!-- BED / PILLOWS / DUVET -->
  <g>
    <!-- Mattress & frame -->
    <rect x="80" y="760" width="640" height="40" fill="#fff4e6" stroke="#1a0e22" stroke-width="3" rx="8"/>
    <!-- Duvet -->
    <rect x="80" y="800" width="640" height="200" fill="url(#duvet)" stroke="#1a0e22" stroke-width="3"/>
    <g fill="#ffe66d" opacity="0.35">
      <path d="M120 820 L140 830 L120 840 Z"/><path d="M220 870 L240 880 L220 890 Z"/><path d="M360 820 L380 830 L360 840 Z"/><path d="M500 870 L520 880 L500 890 Z"/><path d="M620 820 L640 830 L620 840 Z"/>
    </g>
    <g stroke="#fff" stroke-width="2" fill="none" opacity="0.4">
      <path d="M80 900 Q 400 880 720 900"/>
    </g>
    <!-- Throw pillows -->
    <g transform="translate(160 720)">
      <rect x="0" y="0" width="120" height="58" fill="#ffe66d" stroke="#1a0e22" stroke-width="3" rx="10"/>
      <text x="60" y="38" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="22" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1" paint-order="stroke">XOXO</text>
    </g>
    <g transform="translate(520 720)">
      <rect x="0" y="0" width="120" height="58" fill="#5ec8ff" stroke="#1a0e22" stroke-width="3" rx="10"/>
      <path d="M60 32 C 45 18 50 2 62 2 C 67 2 70 6 70 10 C 70 6 74 2 79 2 C 91 2 96 18 81 32 L 70 42 Z" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2"/>
    </g>
  </g>

  <!-- NIGHTSTAND with lava lamp and landline phone -->
  <g transform="translate(0 700)">
    <!-- Nightstand -->
    <rect x="0" y="80" width="110" height="220" fill="#c8a24a" stroke="#1a0e22" stroke-width="3"/>
    <rect x="0" y="80" width="110" height="8" fill="#fff4e6"/>
    <rect x="6" y="110" width="98" height="44" fill="#7a5a26" stroke="#1a0e22" stroke-width="1.5"/>
    <circle cx="55" cy="132" r="3" fill="#1a0e22"/>
    <rect x="6" y="164" width="98" height="44" fill="#7a5a26" stroke="#1a0e22" stroke-width="1.5"/>
    <circle cx="55" cy="186" r="3" fill="#1a0e22"/>
    <!-- Lava lamp -->
    <g transform="translate(14 -4)">
      <rect x="12" y="72" width="44" height="12" fill="#8c90a6" stroke="#1a0e22" stroke-width="2"/>
      <path d="M16 72 L52 72 L48 -8 L20 -8 Z" fill="url(#lava)" stroke="#1a0e22" stroke-width="2"/>
      <g fill="#ff3fa4" opacity="0.85">
        <ellipse cx="28" cy="20" rx="6" ry="10"/>
        <ellipse cx="40" cy="42" rx="8" ry="12"/>
        <ellipse cx="28" cy="58" rx="5" ry="8"/>
      </g>
      <rect x="12" y="-16" width="44" height="10" fill="#8c90a6" stroke="#1a0e22" stroke-width="2"/>
      <path d="M20 -16 L48 -16 L44 -24 L24 -24 Z" fill="#3d4057" stroke="#1a0e22" stroke-width="2"/>
    </g>
    <!-- Landline phone with curly cord -->
    <g transform="translate(60 52)">
      <ellipse cx="22" cy="20" rx="28" ry="12" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2"/>
      <rect x="6" y="14" width="32" height="10" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1.5" rx="3"/>
      <rect x="-4" y="8" width="12" height="18" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2" rx="2"/>
      <rect x="36" y="8" width="12" height="18" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2" rx="2"/>
      <!-- Curly cord -->
      <path d="M42 16 C 56 16 56 24 50 28 C 42 32 42 40 50 44 C 58 48 58 56 50 60 C 42 64 42 72 50 76" stroke="#1a0e22" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- RUG (bottom of frame corner) -->
  <g transform="translate(580 890)">
    <ellipse cx="100" cy="60" rx="180" ry="48" fill="url(#rugSwirl)" stroke="#1a0e22" stroke-width="3"/>
    <!-- Rug fringe -->
    <g stroke="#1a0e22" stroke-width="2">
      <line x1="-66" y1="66" x2="-66" y2="76"/><line x1="-50" y1="78" x2="-50" y2="88"/><line x1="-30" y1="84" x2="-30" y2="94"/><line x1="-10" y1="88" x2="-10" y2="98"/>
      <line x1="210" y1="88" x2="210" y2="98"/><line x1="230" y1="84" x2="230" y2="94"/><line x1="250" y1="78" x2="250" y2="88"/><line x1="266" y1="66" x2="266" y2="76"/>
    </g>
  </g>
</svg>

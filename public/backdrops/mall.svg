<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mallSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe4b5"/>
      <stop offset="0.5" stop-color="#ffd6e7"/>
      <stop offset="1" stop-color="#fff4e6"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fdaff"/>
      <stop offset="1" stop-color="#2a9cd8"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe66d"/>
      <stop offset="0.5" stop-color="#c8a24a"/>
      <stop offset="1" stop-color="#7a5a26"/>
    </linearGradient>
    <linearGradient id="sunbeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="terrazzo" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#f3e2c8"/>
      <g fill="#ff90c2" opacity="0.3"><circle cx="10" cy="12" r="3"/><circle cx="44" cy="38" r="2.5"/></g>
      <g fill="#5ec8ff" opacity="0.3"><circle cx="30" cy="8" r="2"/><circle cx="52" cy="16" r="3"/></g>
      <g fill="#c8a24a" opacity="0.4"><circle cx="18" cy="42" r="2.5"/><circle cx="36" cy="52" r="3"/></g>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#c8a24a" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="0" y2="60" stroke="#c8a24a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="1000" fill="url(#mallSky)"/>

  <!-- Vaulted skylight with arched trusses -->
  <g>
    <path d="M 0 0 L 0 260 Q 400 140 800 260 L 800 0 Z" fill="url(#mallSky)"/>
    <!-- Girder lines (truss arches) -->
    <g stroke="#c8a24a" stroke-width="2.5" fill="none" opacity="0.8">
      <path d="M 0 200 Q 400 80 800 200"/>
      <path d="M 0 230 Q 400 110 800 230"/>
      <path d="M 0 260 Q 400 140 800 260"/>
    </g>
    <!-- Cross girders -->
    <g stroke="#c8a24a" stroke-width="1.5" opacity="0.7">
      <line x1="100" y1="168" x2="100" y2="260"/><line x1="200" y1="144" x2="200" y2="260"/><line x1="300" y1="128" x2="300" y2="260"/><line x1="400" y1="122" x2="400" y2="260"/><line x1="500" y1="128" x2="500" y2="260"/><line x1="600" y1="144" x2="600" y2="260"/><line x1="700" y1="168" x2="700" y2="260"/>
    </g>
    <!-- Sun beams from skylight -->
    <g opacity="0.55">
      <polygon points="180,180 80,500 220,500" fill="url(#sunbeam)"/>
      <polygon points="400,120 320,520 480,520" fill="url(#sunbeam)"/>
      <polygon points="620,180 560,500 700,500" fill="url(#sunbeam)"/>
    </g>
  </g>

  <!-- SECOND-STORY BALCONY with glass railing -->
  <g>
    <!-- Balcony floor -->
    <rect x="0" y="260" width="800" height="14" fill="#c8a24a" stroke="#1a0e22" stroke-width="2"/>
    <!-- Glass railing -->
    <rect x="0" y="274" width="800" height="46" fill="#9fdaff" opacity="0.35" stroke="#8c90a6" stroke-width="1"/>
    <line x1="0" y1="274" x2="800" y2="274" stroke="#8c90a6" stroke-width="2"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#3d4057" stroke-width="2"/>
    <g stroke="#8c90a6" stroke-width="2">
      <line x1="60" y1="274" x2="60" y2="320"/><line x1="160" y1="274" x2="160" y2="320"/><line x1="260" y1="274" x2="260" y2="320"/><line x1="360" y1="274" x2="360" y2="320"/><line x1="460" y1="274" x2="460" y2="320"/><line x1="560" y1="274" x2="560" y2="320"/><line x1="660" y1="274" x2="660" y2="320"/><line x1="760" y1="274" x2="760" y2="320"/>
    </g>
    <!-- Tiny shoppers at rail -->
    <g fill="#3d4057">
      <circle cx="100" cy="268" r="4"/><rect x="97" y="272" width="6" height="8"/>
      <circle cx="240" cy="268" r="4"/><rect x="237" y="272" width="6" height="8"/>
      <circle cx="600" cy="268" r="4"/><rect x="597" y="272" width="6" height="8"/>
      <circle cx="720" cy="268" r="4"/><rect x="717" y="272" width="6" height="8"/>
    </g>
  </g>

  <!-- UPPER-LEVEL STOREFRONTS -->
  <g font-family="Archivo Black, Impact, sans-serif" font-style="italic">
    <!-- Sam Goody -->
    <g transform="translate(10 330)">
      <rect x="0" y="0" width="190" height="56" fill="#ff3fa4" stroke="#1a0e22" stroke-width="3" rx="8"/>
      <text x="95" y="38" text-anchor="middle" font-size="26" fill="#fff" stroke="#1a0e22" stroke-width="1" paint-order="stroke">SAM GOODY</text>
    </g>
    <!-- Claire's -->
    <g transform="translate(215 330)">
      <rect x="0" y="0" width="160" height="56" fill="#5ec8ff" stroke="#1a0e22" stroke-width="3" rx="8"/>
      <text x="80" y="38" text-anchor="middle" font-size="26" fill="#1a0e22">CLAIRE'S</text>
    </g>
    <!-- Orange Julius -->
    <g transform="translate(390 330)">
      <rect x="0" y="0" width="210" height="56" fill="#ffe66d" stroke="#1a0e22" stroke-width="3" rx="8"/>
      <text x="105" y="38" text-anchor="middle" font-size="22" fill="#e01f88">ORANGE JULIUS</text>
    </g>
    <!-- Sunglass Hut -->
    <g transform="translate(615 330)">
      <rect x="0" y="0" width="180" height="56" fill="#1a0e22" stroke="#ffe66d" stroke-width="3" rx="8"/>
      <text x="90" y="37" text-anchor="middle" font-size="21" fill="#ffe66d">SUNGLASS HUT</text>
    </g>
  </g>

  <!-- Store windows (generic glowing rectangles behind railings) -->
  <g>
    <rect x="10" y="396" width="190" height="40" fill="#fff4e6" stroke="#c8a24a" stroke-width="2" rx="4"/>
    <rect x="215" y="396" width="160" height="40" fill="#fff4e6" stroke="#c8a24a" stroke-width="2" rx="4"/>
    <rect x="390" y="396" width="210" height="40" fill="#fff4e6" stroke="#c8a24a" stroke-width="2" rx="4"/>
    <rect x="615" y="396" width="180" height="40" fill="#fff4e6" stroke="#c8a24a" stroke-width="2" rx="4"/>
    <g opacity="0.6">
      <rect x="30" y="406" width="20" height="22" fill="#ff90c2"/><rect x="60" y="406" width="20" height="22" fill="#5ec8ff"/><rect x="90" y="406" width="20" height="22" fill="#ffe66d"/>
      <circle cx="300" cy="418" r="10" fill="#ff3fa4"/>
      <rect x="420" y="406" width="28" height="22" fill="#ffa54c"/><rect x="460" y="406" width="28" height="22" fill="#ffa54c"/>
      <ellipse cx="660" cy="418" rx="16" ry="6" fill="#1a0e22"/><ellipse cx="720" cy="418" rx="16" ry="6" fill="#1a0e22"/>
    </g>
  </g>

  <!-- ESCALATOR cutting diagonally -->
  <g transform="translate(560 440)">
    <polygon points="0,0 160,280 220,280 60,0" fill="#8c90a6" stroke="#1a0e22" stroke-width="3"/>
    <polygon points="0,0 60,0 64,12 4,12" fill="#3d4057"/>
    <!-- Steps -->
    <g stroke="#1a0e22" stroke-width="1.5">
      <line x1="14" y1="40" x2="74" y2="40"/>
      <line x1="26" y1="70" x2="86" y2="70"/>
      <line x1="38" y1="100" x2="98" y2="100"/>
      <line x1="50" y1="130" x2="110" y2="130"/>
      <line x1="62" y1="160" x2="122" y2="160"/>
      <line x1="74" y1="190" x2="134" y2="190"/>
      <line x1="86" y1="220" x2="146" y2="220"/>
      <line x1="98" y1="250" x2="158" y2="250"/>
    </g>
    <!-- Handrails -->
    <line x1="-6" y1="-6" x2="154" y2="274" stroke="#1a0e22" stroke-width="4"/>
    <line x1="66" y1="-6" x2="226" y2="274" stroke="#1a0e22" stroke-width="4"/>
  </g>

  <!-- FOUNTAIN — center base -->
  <g transform="translate(280 740)">
    <!-- Lower pool -->
    <ellipse cx="120" cy="160" rx="250" ry="50" fill="#d7d9e6" stroke="#1a0e22" stroke-width="4"/>
    <ellipse cx="120" cy="160" rx="230" ry="36" fill="url(#water)"/>
    <ellipse cx="120" cy="155" rx="210" ry="20" fill="#fff" opacity="0.25"/>
    <!-- Coin sparkles -->
    <g fill="#ffe66d" stroke="#1a0e22" stroke-width="0.8">
      <circle cx="40" cy="168" r="4"/><circle cx="180" cy="164" r="4"/><circle cx="240" cy="172" r="4"/>
    </g>
    <!-- Tiered column + bowls -->
    <rect x="112" y="20" width="16" height="140" fill="url(#brass)" stroke="#1a0e22" stroke-width="2"/>
    <ellipse cx="120" cy="98" rx="62" ry="12" fill="url(#brass)" stroke="#1a0e22" stroke-width="2"/>
    <ellipse cx="120" cy="98" rx="56" ry="6" fill="#fff" opacity="0.4"/>
    <ellipse cx="120" cy="36" rx="38" ry="8" fill="url(#brass)" stroke="#1a0e22" stroke-width="2"/>
    <!-- Water arcs -->
    <g stroke="#9fdaff" stroke-width="3" fill="none" opacity="0.85">
      <path d="M120 24 Q 90 40 72 90"/>
      <path d="M120 24 Q 150 40 168 90"/>
      <path d="M120 82 Q 78 98 62 130"/>
      <path d="M120 82 Q 162 98 178 130"/>
    </g>
    <g fill="#ffffff" opacity="0.8">
      <circle cx="66" cy="120" r="3"/><circle cx="172" cy="122" r="3"/><circle cx="88" cy="140" r="2"/><circle cx="152" cy="140" r="2"/>
    </g>
  </g>

  <!-- POTTED PALMS flanking the fountain -->
  <g transform="translate(60 800)">
    <rect x="0" y="110" width="70" height="70" fill="#7a5a26" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <rect x="0" y="110" width="70" height="16" fill="#c8a24a"/>
    <rect x="32" y="0" width="6" height="112" fill="#5a2a16" stroke="#1a0e22" stroke-width="1.5"/>
    <g stroke="#1a0e22" stroke-width="2">
      <path d="M35 40 Q 5 10 -14 30" fill="#7ea06f"/>
      <path d="M35 40 Q 65 10 86 30" fill="#7ea06f"/>
      <path d="M35 20 Q 10 -4 0 12" fill="#5a7a52"/>
      <path d="M35 20 Q 60 -4 72 12" fill="#5a7a52"/>
      <path d="M35 60 Q -2 54 -16 72" fill="#7ea06f"/>
      <path d="M35 60 Q 74 54 90 72" fill="#7ea06f"/>
    </g>
  </g>
  <g transform="translate(670 800)">
    <rect x="0" y="110" width="70" height="70" fill="#7a5a26" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <rect x="0" y="110" width="70" height="16" fill="#c8a24a"/>
    <rect x="32" y="0" width="6" height="112" fill="#5a2a16" stroke="#1a0e22" stroke-width="1.5"/>
    <g stroke="#1a0e22" stroke-width="2">
      <path d="M35 40 Q 5 10 -14 30" fill="#7ea06f"/>
      <path d="M35 40 Q 65 10 86 30" fill="#7ea06f"/>
      <path d="M35 20 Q 10 -4 0 12" fill="#5a7a52"/>
      <path d="M35 20 Q 60 -4 72 12" fill="#5a7a52"/>
      <path d="M35 60 Q -2 54 -16 72" fill="#7ea06f"/>
      <path d="M35 60 Q 74 54 90 72" fill="#7ea06f"/>
    </g>
  </g>

  <!-- FLOOR with terrazzo -->
  <rect x="0" y="920" width="800" height="80" fill="url(#terrazzo)"/>
  <line x1="0" y1="920" x2="800" y2="920" stroke="#c8a24a" stroke-width="2"/>

  <!-- Small directory kiosk far-left ground level -->
  <g transform="translate(40 740)">
    <rect x="0" y="0" width="20" height="140" fill="#3d4057" stroke="#1a0e22" stroke-width="2"/>
    <rect x="-20" y="-40" width="60" height="60" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2" rx="4"/>
    <text x="10" y="-4" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="12" fill="#ffe66d" letter-spacing="1">YOU</text>
    <text x="10" y="10" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="12" fill="#ffe66d" letter-spacing="1">ARE</text>
    <text x="10" y="24" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="12" fill="#ffe66d" letter-spacing="1">HERE</text>
  </g>

  <!-- Bench ground-right -->
  <g transform="translate(160 880)">
    <rect x="0" y="0" width="130" height="14" fill="#7a5a26" stroke="#1a0e22" stroke-width="2" rx="3"/>
    <rect x="6" y="14" width="6" height="24" fill="#3d4057" stroke="#1a0e22" stroke-width="1.5"/>
    <rect x="118" y="14" width="6" height="24" fill="#3d4057" stroke="#1a0e22" stroke-width="1.5"/>
    <!-- Shopping bag on bench -->
    <rect x="40" y="-28" width="36" height="28" fill="#ff3fa4" stroke="#1a0e22" stroke-width="2"/>
    <path d="M48 -28 Q 48 -40 58 -40 Q 68 -40 68 -28" stroke="#1a0e22" stroke-width="2" fill="none"/>
  </g>
</svg>

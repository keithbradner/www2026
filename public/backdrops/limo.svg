<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d2158"/>
      <stop offset="0.5" stop-color="#2a1a38"/>
      <stop offset="1" stop-color="#0a0614"/>
    </linearGradient>
    <linearGradient id="headliner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e22"/>
      <stop offset="1" stop-color="#3d2158"/>
    </linearGradient>
    <linearGradient id="neonStrip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3fa4"/>
      <stop offset="0.33" stop-color="#8b4cd6"/>
      <stop offset="0.66" stop-color="#5ec8ff"/>
      <stop offset="1" stop-color="#ff3fa4"/>
    </linearGradient>
    <linearGradient id="citySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e22"/>
      <stop offset="0.6" stop-color="#5e2fa3"/>
      <stop offset="1" stop-color="#ff3fa4"/>
    </linearGradient>
    <linearGradient id="floorLed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3fa4" stop-opacity="0"/>
      <stop offset="1" stop-color="#ff3fa4" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="mirror" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#d7d9e6"/>
      <stop offset="1" stop-color="#8c90a6"/>
    </linearGradient>
    <radialGradient id="discoGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="tuft" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#2a1a38"/>
      <path d="M40 0 L80 40 L40 80 L0 40 Z" fill="none" stroke="#1a0e22" stroke-width="1"/>
      <path d="M40 0 L80 40 L40 80 L0 40 Z" fill="none" stroke="#5e2fa3" stroke-width="0.5" opacity="0.6"/>
      <circle cx="40" cy="0" r="1.5" fill="#8b4cd6"/>
      <circle cx="80" cy="40" r="1.5" fill="#8b4cd6"/>
      <circle cx="40" cy="80" r="1.5" fill="#8b4cd6"/>
      <circle cx="0" cy="40" r="1.5" fill="#8b4cd6"/>
      <circle cx="40" cy="40" r="1.2" fill="#ffe66d" opacity="0.8"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="800" height="1000" fill="url(#leather)"/>

  <!-- HEADLINER arches -->
  <path d="M 0 0 L 800 0 L 800 120 Q 400 60 0 120 Z" fill="url(#headliner)"/>
  <!-- Neon ceiling strip -->
  <rect x="0" y="108" width="800" height="6" fill="url(#neonStrip)"/>
  <rect x="0" y="106" width="800" height="2" fill="#ffffff" opacity="0.5"/>

  <!-- REAR WINDOW (Manhattan by night) -->
  <g transform="translate(160 130)">
    <rect x="-6" y="-6" width="492" height="252" rx="8" fill="#1a0e22"/>
    <rect x="0" y="0" width="480" height="240" fill="url(#citySky)" stroke="#8c90a6" stroke-width="3" rx="6"/>
    <!-- Moon -->
    <circle cx="402" cy="40" r="14" fill="#fff4e6" opacity="0.9"/>
    <!-- Stars -->
    <g fill="#ffffff" opacity="0.8">
      <circle cx="30" cy="20" r="1.2"/><circle cx="80" cy="40" r="1"/><circle cx="140" cy="15" r="1.2"/><circle cx="210" cy="36" r="1"/><circle cx="280" cy="18" r="1.2"/><circle cx="350" cy="44" r="1"/><circle cx="440" cy="24" r="1.2"/>
    </g>
    <!-- NYC skyline silhouette -->
    <g fill="#0a0614">
      <rect x="0" y="120" width="54" height="120"/>
      <rect x="48" y="88" width="42" height="152"/>
      <rect x="84" y="140" width="38" height="100"/>
      <rect x="116" y="70" width="50" height="170"/>
      <polygon points="141,70 141,50 148,50 148,70"/>
      <rect x="162" y="110" width="38" height="130"/>
      <rect x="196" y="60" width="56" height="180"/>
      <rect x="248" y="130" width="40" height="110"/>
      <rect x="284" y="100" width="48" height="140"/>
      <rect x="328" y="66" width="54" height="174"/>
      <polygon points="355,66 355,36 362,36 362,66"/>
      <rect x="378" y="124" width="42" height="116"/>
      <rect x="416" y="90" width="48" height="150"/>
      <rect x="460" y="130" width="20" height="110"/>
    </g>
    <!-- Lit windows -->
    <g fill="#ffe66d" opacity="0.9">
      <rect x="10" y="140" width="4" height="4"/><rect x="20" y="160" width="4" height="4"/><rect x="35" y="180" width="4" height="4"/><rect x="14" y="210" width="4" height="4"/>
      <rect x="58" y="100" width="4" height="4"/><rect x="74" y="130" width="4" height="4"/><rect x="62" y="170" width="4" height="4"/><rect x="80" y="200" width="4" height="4"/>
      <rect x="128" y="80" width="4" height="4"/><rect x="148" y="110" width="4" height="4"/><rect x="136" y="150" width="4" height="4"/><rect x="156" y="190" width="4" height="4"/>
      <rect x="208" y="76" width="4" height="4"/><rect x="230" y="100" width="4" height="4"/><rect x="216" y="150" width="4" height="4"/><rect x="238" y="200" width="4" height="4"/>
      <rect x="294" y="116" width="4" height="4"/><rect x="318" y="146" width="4" height="4"/><rect x="302" y="186" width="4" height="4"/>
      <rect x="338" y="86" width="4" height="4"/><rect x="362" y="116" width="4" height="4"/><rect x="348" y="156" width="4" height="4"/><rect x="370" y="196" width="4" height="4"/>
      <rect x="424" y="106" width="4" height="4"/><rect x="446" y="136" width="4" height="4"/><rect x="432" y="176" width="4" height="4"/>
    </g>
    <!-- Neon sign on a building -->
    <g transform="translate(210 130)">
      <rect x="0" y="0" width="42" height="16" fill="#ff3fa4"/>
      <text x="21" y="13" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="11" fill="#ffe66d">POP!</text>
    </g>
    <g transform="translate(60 180)">
      <rect x="0" y="0" width="30" height="12" fill="#5ec8ff"/>
      <text x="15" y="10" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="9" fill="#1a0e22">MTV</text>
    </g>
    <!-- Taillight streaks across bottom -->
    <g>
      <rect x="0" y="218" width="480" height="22" fill="#0a0614"/>
      <g opacity="0.85">
        <rect x="20" y="222" width="120" height="4" fill="#ff3fa4"/>
        <rect x="60" y="228" width="160" height="4" fill="#ff3fa4"/>
        <rect x="180" y="222" width="140" height="4" fill="#ff3fa4"/>
      </g>
      <g opacity="0.85">
        <rect x="280" y="234" width="160" height="4" fill="#ffffff"/>
        <rect x="340" y="226" width="120" height="4" fill="#ffffff"/>
      </g>
    </g>
  </g>

  <!-- DISCO BALL hanging from ceiling -->
  <g transform="translate(400 130)">
    <line x1="0" y1="-30" x2="0" y2="0" stroke="#8c90a6" stroke-width="2"/>
    <rect x="-10" y="0" width="20" height="6" fill="#3d4057" stroke="#1a0e22" stroke-width="1.5"/>
    <circle cx="0" cy="50" r="52" fill="url(#discoGlow)"/>
    <circle cx="0" cy="44" r="42" fill="#d7d9e6" stroke="#1a0e22" stroke-width="2"/>
    <!-- Mirror facets -->
    <g stroke="#8c90a6" stroke-width="0.8">
      <path d="M-42 44 L42 44" />
      <path d="M-40 30 L40 30" />
      <path d="M-40 58 L40 58" />
      <path d="M-36 16 L36 16" />
      <path d="M-36 72 L36 72" />
      <path d="M0 2 L0 86" />
      <path d="M-22 6 L-22 82" />
      <path d="M22 6 L22 82" />
      <path d="M-32 20 Q 0 16 32 20" fill="none"/>
      <path d="M-32 68 Q 0 72 32 68" fill="none"/>
    </g>
    <g fill="#ffffff" opacity="0.9">
      <rect x="-14" y="18" width="6" height="6"/><rect x="4" y="26" width="6" height="6"/><rect x="-26" y="44" width="6" height="6"/><rect x="18" y="52" width="6" height="6"/><rect x="-8" y="62" width="6" height="6"/>
    </g>
    <!-- Sparkle rays -->
    <g stroke="#ffffff" stroke-width="1.5" opacity="0.8">
      <line x1="-70" y1="44" x2="-50" y2="44"/><line x1="70" y1="44" x2="50" y2="44"/><line x1="0" y1="-4" x2="0" y2="6"/><line x1="0" y1="82" x2="0" y2="96"/>
    </g>
  </g>

  <!-- TUFTED LEATHER SIDE PANELS -->
  <g>
    <!-- Left panel -->
    <rect x="0" y="390" width="180" height="440" fill="url(#tuft)"/>
    <path d="M 0 390 L 180 390 L 180 830 L 0 830 Z" fill="none" stroke="#1a0e22" stroke-width="3"/>
    <!-- Right panel -->
    <rect x="620" y="390" width="180" height="440" fill="url(#tuft)"/>
    <path d="M 620 390 L 800 390 L 800 830 L 620 830 Z" fill="none" stroke="#1a0e22" stroke-width="3"/>
  </g>

  <!-- MINIBAR on right side -->
  <g transform="translate(620 420)">
    <rect x="6" y="0" width="164" height="140" fill="#3d2158" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <rect x="14" y="8" width="148" height="74" fill="#1a0e22" stroke="#ffe66d" stroke-width="2" rx="4"/>
    <rect x="14" y="8" width="148" height="74" fill="#8b4cd6" opacity="0.35"/>
    <text x="88" y="28" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="12" fill="#ffe66d" letter-spacing="2">MINI BAR</text>
    <!-- Ice bucket -->
    <g transform="translate(26 34)">
      <path d="M0 6 L40 6 L36 44 L4 44 Z" fill="url(#mirror)" stroke="#1a0e22" stroke-width="1.5"/>
      <ellipse cx="20" cy="6" rx="20" ry="4" fill="#d7d9e6" stroke="#1a0e22" stroke-width="1.5"/>
      <!-- Champagne bottle -->
      <path d="M18 -12 L22 -12 L24 0 L16 0 Z" fill="#1a0e22" stroke="#1a0e22" stroke-width="1"/>
      <rect x="16" y="-2" width="8" height="12" fill="#ffe66d" stroke="#1a0e22" stroke-width="1"/>
      <rect x="13" y="10" width="14" height="26" fill="#1a0e22"/>
      <rect x="14" y="16" width="12" height="10" fill="#ff3fa4"/>
      <text x="20" y="24" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="6" fill="#ffe66d">PINK</text>
    </g>
    <!-- 2 flutes -->
    <g transform="translate(82 34)">
      <polygon points="0,0 16,0 14,18 2,18" fill="url(#mirror)" stroke="#1a0e22" stroke-width="1.2"/>
      <rect x="7" y="18" width="2" height="22" fill="url(#mirror)"/>
      <ellipse cx="8" cy="42" rx="10" ry="2" fill="#8c90a6" stroke="#1a0e22" stroke-width="1.2"/>
      <polygon points="6,2 12,2 12,14 6,14" fill="#ffe66d" opacity="0.7"/>
    </g>
    <g transform="translate(106 34)">
      <polygon points="0,0 16,0 14,18 2,18" fill="url(#mirror)" stroke="#1a0e22" stroke-width="1.2"/>
      <rect x="7" y="18" width="2" height="22" fill="url(#mirror)"/>
      <ellipse cx="8" cy="42" rx="10" ry="2" fill="#8c90a6" stroke="#1a0e22" stroke-width="1.2"/>
      <polygon points="6,2 12,2 12,14 6,14" fill="#ffe66d" opacity="0.7"/>
    </g>
    <!-- Cocktail shaker -->
    <g transform="translate(136 34)">
      <path d="M0 8 L20 8 L18 44 L2 44 Z" fill="url(#mirror)" stroke="#1a0e22" stroke-width="1.5"/>
      <rect x="2" y="0" width="16" height="8" fill="url(#mirror)" stroke="#1a0e22" stroke-width="1.5"/>
      <circle cx="10" cy="4" r="2" fill="#1a0e22"/>
    </g>
    <!-- Counter lip -->
    <rect x="6" y="86" width="164" height="8" fill="#c8a24a" stroke="#1a0e22" stroke-width="1.5"/>
    <!-- Coaster + card -->
    <rect x="16" y="100" width="30" height="30" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1.5" rx="2"/>
    <circle cx="80" cy="115" r="10" fill="#5ec8ff" stroke="#1a0e22" stroke-width="1.5"/>
    <rect x="108" y="108" width="48" height="22" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.5" rx="2"/>
    <text x="132" y="122" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="8" fill="#1a0e22" letter-spacing="1">V.I.P.</text>
  </g>

  <!-- WRAPAROUND BENCH SEAT -->
  <g>
    <!-- Front edge of seat -->
    <rect x="0" y="830" width="800" height="70" fill="#3d2158" stroke="#1a0e22" stroke-width="3"/>
    <!-- Seat tufting diamond pattern -->
    <g fill="none" stroke="#5e2fa3" stroke-width="1" opacity="0.8">
      <path d="M40 862 L100 842 L160 862 L220 842 L280 862 L340 842 L400 862 L460 842 L520 862 L580 842 L640 862 L700 842 L760 862"/>
      <path d="M40 888 L100 868 L160 888 L220 868 L280 888 L340 868 L400 888 L460 868 L520 888 L580 868 L640 888 L700 868 L760 888"/>
    </g>
    <g fill="#ffe66d" opacity="0.85">
      <circle cx="100" cy="842" r="2.5"/><circle cx="220" cy="842" r="2.5"/><circle cx="340" cy="842" r="2.5"/><circle cx="460" cy="842" r="2.5"/><circle cx="580" cy="842" r="2.5"/><circle cx="700" cy="842" r="2.5"/>
      <circle cx="40" cy="862" r="2.5"/><circle cx="160" cy="862" r="2.5"/><circle cx="280" cy="862" r="2.5"/><circle cx="400" cy="862" r="2.5"/><circle cx="520" cy="862" r="2.5"/><circle cx="640" cy="862" r="2.5"/><circle cx="760" cy="862" r="2.5"/>
    </g>
    <!-- Seat cushion highlight -->
    <rect x="0" y="830" width="800" height="4" fill="#8b4cd6" opacity="0.5"/>
  </g>

  <!-- FLOOR with LED ACCENT -->
  <g>
    <rect x="0" y="900" width="800" height="100" fill="#0a0614"/>
    <rect x="0" y="900" width="800" height="4" fill="#ff3fa4"/>
    <rect x="0" y="900" width="800" height="40" fill="url(#floorLed)" opacity="0.5" transform="translate(0 -40)"/>
    <!-- LED dots on floor -->
    <g fill="#ff3fa4" opacity="0.9">
      <circle cx="40" cy="940" r="3"/><circle cx="120" cy="940" r="3"/><circle cx="200" cy="940" r="3"/><circle cx="280" cy="940" r="3"/><circle cx="360" cy="940" r="3"/><circle cx="440" cy="940" r="3"/><circle cx="520" cy="940" r="3"/><circle cx="600" cy="940" r="3"/><circle cx="680" cy="940" r="3"/><circle cx="760" cy="940" r="3"/>
    </g>
    <g fill="#5ec8ff" opacity="0.7">
      <circle cx="80" cy="970" r="2"/><circle cx="240" cy="970" r="2"/><circle cx="400" cy="970" r="2"/><circle cx="560" cy="970" r="2"/><circle cx="720" cy="970" r="2"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="stageBg" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#6a35b8"/>
      <stop offset="0.55" stop-color="#2a1a38"/>
      <stop offset="1" stop-color="#0a0614"/>
    </radialGradient>
    <linearGradient id="beamPink" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ff3fa4" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ff3fa4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamCyan" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#5ec8ff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#5ec8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamYellow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffe66d" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffe66d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8b4cd6" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#ff90c2" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#5e2fa3" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f7fb"/>
      <stop offset="0.5" stop-color="#8c90a6"/>
      <stop offset="1" stop-color="#3d4057"/>
    </linearGradient>
    <pattern id="grille" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#0a0614"/>
      <circle cx="5" cy="5" r="2.4" fill="#3d4057"/>
    </pattern>
  </defs>

  <rect width="800" height="1000" fill="url(#stageBg)"/>

  <!-- Distant laser rays -->
  <g opacity="0.45">
    <polygon points="240,220 0,820 80,1000 260,1000" fill="#ff3fa4"/>
    <polygon points="560,220 800,820 720,1000 540,1000" fill="#5ec8ff"/>
    <polygon points="400,220 320,1000 480,1000" fill="#ffe66d" opacity="0.55"/>
  </g>

  <!-- Spotlight beams fanning down -->
  <g opacity="0.75">
    <polygon points="150,205 60,720 240,720" fill="url(#beamPink)"/>
    <polygon points="270,205 220,720 320,720" fill="url(#beamYellow)"/>
    <polygon points="390,205 370,720 410,720" fill="url(#beamCyan)"/>
    <polygon points="510,205 480,720 540,720" fill="url(#beamYellow)"/>
    <polygon points="650,205 560,720 740,720" fill="url(#beamPink)"/>
  </g>

  <!-- MARQUEE SIGN -->
  <g transform="translate(90 28)">
    <rect x="-4" y="-4" width="628" height="138" rx="10" fill="#1a0e22"/>
    <rect x="0" y="0" width="620" height="130" rx="8" fill="#1a0e22" stroke="#ffe66d" stroke-width="3"/>
    <rect x="10" y="10" width="600" height="110" fill="#2a1a38"/>
    <!-- Chase bulbs -->
    <g fill="#ffe66d" stroke="#1a0e22" stroke-width="1.2">
      <circle cx="20" cy="0" r="6"/><circle cx="70" cy="0" r="6"/><circle cx="120" cy="0" r="6"/><circle cx="170" cy="0" r="6"/><circle cx="220" cy="0" r="6"/><circle cx="270" cy="0" r="6"/><circle cx="320" cy="0" r="6"/><circle cx="370" cy="0" r="6"/><circle cx="420" cy="0" r="6"/><circle cx="470" cy="0" r="6"/><circle cx="520" cy="0" r="6"/><circle cx="570" cy="0" r="6"/><circle cx="600" cy="0" r="6"/>
    </g>
    <g fill="#ff90c2" stroke="#1a0e22" stroke-width="1.2">
      <circle cx="45" cy="130" r="6"/><circle cx="95" cy="130" r="6"/><circle cx="145" cy="130" r="6"/><circle cx="195" cy="130" r="6"/><circle cx="245" cy="130" r="6"/><circle cx="295" cy="130" r="6"/><circle cx="345" cy="130" r="6"/><circle cx="395" cy="130" r="6"/><circle cx="445" cy="130" r="6"/><circle cx="495" cy="130" r="6"/><circle cx="545" cy="130" r="6"/><circle cx="595" cy="130" r="6"/>
    </g>
    <text x="310" y="54" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="22" fill="#5ec8ff" letter-spacing="7">★ LIVE TONIGHT ★</text>
    <text x="310" y="100" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="36" fill="#ff3fa4" stroke="#ffe66d" stroke-width="1.4" paint-order="stroke">WHAT WOMEN WANT</text>
  </g>

  <!-- LIGHTING TRUSS -->
  <g>
    <rect x="40" y="194" width="720" height="14" fill="#8c90a6" stroke="#1a0e22" stroke-width="2"/>
    <rect x="40" y="194" width="720" height="5" fill="#d7d9e6"/>
    <path d="M40 194 L80 208 L120 194 L160 208 L200 194 L240 208 L280 194 L320 208 L360 194 L400 208 L440 194 L480 208 L520 194 L560 208 L600 194 L640 208 L680 194 L720 208 L760 194" stroke="#1a0e22" stroke-width="1.5" fill="none"/>
    <!-- 5 hanging spotlights -->
    <g>
      <g transform="translate(150 208)"><line x1="0" y1="0" x2="0" y2="8" stroke="#8c90a6" stroke-width="2"/><rect x="-16" y="8" width="32" height="22" fill="#3d4057" stroke="#1a0e22" stroke-width="2" rx="2"/><circle cx="0" cy="32" r="7" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1.5"/></g>
      <g transform="translate(270 208)"><line x1="0" y1="0" x2="0" y2="8" stroke="#8c90a6" stroke-width="2"/><rect x="-16" y="8" width="32" height="22" fill="#3d4057" stroke="#1a0e22" stroke-width="2" rx="2"/><circle cx="0" cy="32" r="7" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.5"/></g>
      <g transform="translate(390 208)"><line x1="0" y1="0" x2="0" y2="8" stroke="#8c90a6" stroke-width="2"/><rect x="-16" y="8" width="32" height="22" fill="#3d4057" stroke="#1a0e22" stroke-width="2" rx="2"/><circle cx="0" cy="32" r="7" fill="#5ec8ff" stroke="#1a0e22" stroke-width="1.5"/></g>
      <g transform="translate(510 208)"><line x1="0" y1="0" x2="0" y2="8" stroke="#8c90a6" stroke-width="2"/><rect x="-16" y="8" width="32" height="22" fill="#3d4057" stroke="#1a0e22" stroke-width="2" rx="2"/><circle cx="0" cy="32" r="7" fill="#ffe66d" stroke="#1a0e22" stroke-width="1.5"/></g>
      <g transform="translate(650 208)"><line x1="0" y1="0" x2="0" y2="8" stroke="#8c90a6" stroke-width="2"/><rect x="-16" y="8" width="32" height="22" fill="#3d4057" stroke="#1a0e22" stroke-width="2" rx="2"/><circle cx="0" cy="32" r="7" fill="#ff3fa4" stroke="#1a0e22" stroke-width="1.5"/></g>
    </g>
  </g>

  <!-- PA SPEAKER STACK — LEFT -->
  <g transform="translate(20 290)">
    <rect x="0" y="0" width="120" height="120" fill="url(#grille)" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <circle cx="60" cy="50" r="30" fill="#1a0e22" stroke="#3d4057" stroke-width="3"/>
    <circle cx="60" cy="50" r="18" fill="#3d4057"/>
    <circle cx="60" cy="50" r="6" fill="#8c90a6"/>
    <rect x="20" y="92" width="80" height="16" fill="#3d4057" stroke="#1a0e22" stroke-width="1.5" rx="2"/>
    <rect x="0" y="130" width="120" height="120" fill="url(#grille)" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <circle cx="60" cy="180" r="30" fill="#1a0e22" stroke="#3d4057" stroke-width="3"/>
    <circle cx="60" cy="180" r="18" fill="#3d4057"/>
    <circle cx="60" cy="180" r="6" fill="#8c90a6"/>
    <rect x="20" y="222" width="80" height="16" fill="#3d4057" stroke="#1a0e22" stroke-width="1.5" rx="2"/>
    <rect x="0" y="260" width="120" height="80" fill="url(#grille)" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <rect x="10" y="276" width="48" height="48" fill="#1a0e22" stroke="#3d4057" stroke-width="2"/>
    <rect x="62" y="276" width="48" height="48" fill="#1a0e22" stroke="#3d4057" stroke-width="2"/>
  </g>

  <!-- PA SPEAKER STACK — RIGHT -->
  <g transform="translate(660 290)">
    <rect x="0" y="0" width="120" height="120" fill="url(#grille)" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <circle cx="60" cy="50" r="30" fill="#1a0e22" stroke="#3d4057" stroke-width="3"/>
    <circle cx="60" cy="50" r="18" fill="#3d4057"/>
    <circle cx="60" cy="50" r="6" fill="#8c90a6"/>
    <rect x="20" y="92" width="80" height="16" fill="#3d4057" stroke="#1a0e22" stroke-width="1.5" rx="2"/>
    <rect x="0" y="130" width="120" height="120" fill="url(#grille)" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <circle cx="60" cy="180" r="30" fill="#1a0e22" stroke="#3d4057" stroke-width="3"/>
    <circle cx="60" cy="180" r="18" fill="#3d4057"/>
    <circle cx="60" cy="180" r="6" fill="#8c90a6"/>
    <rect x="20" y="222" width="80" height="16" fill="#3d4057" stroke="#1a0e22" stroke-width="1.5" rx="2"/>
    <rect x="0" y="260" width="120" height="80" fill="url(#grille)" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <rect x="10" y="276" width="48" height="48" fill="#1a0e22" stroke="#3d4057" stroke-width="2"/>
    <rect x="62" y="276" width="48" height="48" fill="#1a0e22" stroke="#3d4057" stroke-width="2"/>
  </g>

  <!-- Smoke machine haze band -->
  <rect x="0" y="680" width="800" height="200" fill="url(#haze)"/>

  <!-- STAGE RISER lip -->
  <g>
    <rect x="0" y="820" width="800" height="20" fill="#3d4057" stroke="#1a0e22" stroke-width="2"/>
    <rect x="0" y="840" width="800" height="10" fill="#8c90a6"/>
    <!-- Floor monitors on stage edge -->
    <g transform="translate(200 785)">
      <polygon points="0,35 110,35 100,0 10,0" fill="url(#grille)" stroke="#1a0e22" stroke-width="2"/>
      <text x="55" y="24" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="11" fill="#ffe66d" letter-spacing="2">MONITOR</text>
    </g>
    <g transform="translate(490 785)">
      <polygon points="0,35 110,35 100,0 10,0" fill="url(#grille)" stroke="#1a0e22" stroke-width="2"/>
      <text x="55" y="24" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="11" fill="#ffe66d" letter-spacing="2">MONITOR</text>
    </g>
  </g>

  <!-- CROWD silhouettes — three layers for depth -->
  <g>
    <!-- Back row: smaller heads -->
    <g fill="#1a0e22" opacity="0.85">
      <circle cx="30" cy="880" r="14"/><circle cx="80" cy="870" r="16"/><circle cx="140" cy="878" r="14"/><circle cx="195" cy="866" r="17"/><circle cx="250" cy="876" r="14"/><circle cx="305" cy="866" r="16"/><circle cx="360" cy="880" r="14"/><circle cx="420" cy="868" r="17"/><circle cx="480" cy="878" r="14"/><circle cx="540" cy="864" r="16"/><circle cx="600" cy="878" r="14"/><circle cx="660" cy="866" r="17"/><circle cx="720" cy="880" r="14"/><circle cx="775" cy="870" r="16"/>
      <rect x="0" y="890" width="800" height="30"/>
    </g>
    <!-- Raised arms -->
    <g stroke="#1a0e22" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M90 880 Q 92 840 98 815"/>
      <path d="M195 870 Q 200 830 208 802"/>
      <path d="M305 868 Q 310 828 318 806"/>
      <path d="M420 870 Q 424 836 432 810"/>
      <path d="M540 865 Q 545 830 554 804"/>
      <path d="M660 868 Q 665 825 673 800"/>
    </g>
    <!-- Front row: bigger heads + torsos -->
    <g fill="#0a0614">
      <path d="M0 920 Q 40 890 80 920 Q 120 880 180 920 Q 230 885 280 920 Q 330 888 390 920 Q 440 884 500 920 Q 550 890 610 920 Q 660 886 720 920 Q 770 890 800 920 L 800 1000 L 0 1000 Z"/>
    </g>
    <!-- Lighter/phone flames and flashes -->
    <g>
      <circle cx="100" cy="810" r="4" fill="#ffe66d"/>
      <circle cx="100" cy="810" r="9" fill="#ffe66d" opacity="0.35"/>
      <circle cx="320" cy="800" r="4" fill="#ffe66d"/>
      <circle cx="320" cy="800" r="9" fill="#ffe66d" opacity="0.35"/>
      <circle cx="555" cy="802" r="4" fill="#ffe66d"/>
      <circle cx="555" cy="802" r="9" fill="#ffe66d" opacity="0.35"/>
    </g>
    <!-- Camera flashes -->
    <g>
      <g transform="translate(215 820)">
        <circle r="10" fill="#ffffff"/>
        <g stroke="#ffffff" stroke-width="3" stroke-linecap="round">
          <line x1="-18" y1="0" x2="-10" y2="0"/><line x1="18" y1="0" x2="10" y2="0"/><line x1="0" y1="-18" x2="0" y2="-10"/><line x1="-13" y1="-13" x2="-7" y2="-7"/><line x1="13" y1="-13" x2="7" y2="-7"/>
        </g>
      </g>
      <g transform="translate(670 815)">
        <circle r="10" fill="#ffffff"/>
        <g stroke="#ffffff" stroke-width="3" stroke-linecap="round">
          <line x1="-18" y1="0" x2="-10" y2="0"/><line x1="18" y1="0" x2="10" y2="0"/><line x1="0" y1="-18" x2="0" y2="-10"/><line x1="-13" y1="-13" x2="-7" y2="-7"/><line x1="13" y1="-13" x2="7" y2="-7"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Foreground chrome microphone on stand (lower center, will peek around subject's feet) -->
  <g transform="translate(380 760)">
    <rect x="17" y="70" width="6" height="170" fill="url(#chrome)" stroke="#1a0e22" stroke-width="1.5"/>
    <ellipse cx="20" cy="240" rx="60" ry="10" fill="#3d4057" stroke="#1a0e22" stroke-width="2"/>
    <ellipse cx="20" cy="240" rx="60" ry="4" fill="#8c90a6"/>
  </g>
</svg>

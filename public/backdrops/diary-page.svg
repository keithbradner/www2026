    <text x="0" y="42" font-family="Caveat, cursive" font-size="44" fill="#ff3fa4" font-weight="700">CRUSH ☆</text>
    <path d="M-10 50 L180 50" stroke="#ff3fa4" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- MASH game grid -->
  <g transform="translate(380 260)">
    <text x="0" y="0" font-family="Caveat, cursive" font-size="22" fill="#1a0e22">M · A · S · H</text>
    <g font-family="Caveat, cursive" font-size="15" fill="#1a0e22">
      <text x="0" y="22">M: mansion</text>
      <text x="0" y="42">A: apartment</text>
      <text x="0" y="62">S: shack ✗</text>
      <text x="0" y="82">H: house ♥</text>
    </g>
    <text x="110" y="22" font-family="Caveat, cursive" font-size="15" fill="#e01f88">kids: 3</text>
    <text x="110" y="42" font-family="Caveat, cursive" font-size="15" fill="#e01f88">car: limo</text>
    <text x="110" y="62" font-family="Caveat, cursive" font-size="15" fill="#e01f88">$$$: 💰</text>
    <text x="110" y="82" font-family="Caveat, cursive" font-size="15" fill="#e01f88">job: star</text>

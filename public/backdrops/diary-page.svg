    <text x="35" y="38" text-anchor="middle" font-family="Caveat, cursive" font-size="24" fill="#ff3fa4">S + J</text>
    <text x="35" y="56" text-anchor="middle" font-family="Caveat, cursive" font-size="14" fill="#ff3fa4">4EVR</text>

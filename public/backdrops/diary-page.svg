      <circle cx="44" cy="1" r="8" fill="#5ec8ff"/>
      <circle cx="66" cy="-2" r="8" fill="#c6ff3a"/>
      <circle cx="88" cy="-4" r="8" fill="#ff90c2"/>
      <circle cx="110" cy="-5" r="8" fill="#8b4cd6"/>
      <circle cx="132" cy="-4" r="8" fill="#ffe66d"/>
      <circle cx="154" cy="-2" r="8" fill="#ff3fa4"/>
      <circle cx="176" cy="1" r="8" fill="#5ec8ff"/>
      <circle cx="198" cy="6" r="8" fill="#c6ff3a"/>
      <circle cx="220" cy="12" r="8" fill="#ff90c2"/>

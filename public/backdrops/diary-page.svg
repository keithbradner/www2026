    <path d="M48 30 Q 58 14 72 22 Q 60 40 48 30 Z"/>
    <path d="M48 70 Q 58 54 72 62 Q 60 80 48 70 Z"/>
    <path d="M48 110 Q 58 94 72 102 Q 60 120 48 110 Z"/>
    <path d="M48 150 Q 58 134 72 142 Q 60 160 48 150 Z"/>
    <path d="M48 190 Q 58 174 72 182 Q 60 200 48 190 Z"/>
    <path d="M48 230 Q 58 214 72 222 Q 60 240 48 230 Z"/>
    <path d="M48 270 Q 58 254 72 262 Q 60 280 48 270 Z"/>
    <path d="M48 310 Q 58 294 72 302 Q 60 320 48 310 Z"/>
    <path d="M48 350 Q 58 334 72 342 Q 60 360 48 350 Z"/>
    <path d="M48 390 Q 58 374 72 382 Q 60 400 48 390 Z"/>
    <path d="M48 430 Q 58 414 72 422 Q 60 440 48 430 Z"/>
    <path d="M48 470 Q 58 454 72 462 Q 60 480 48 470 Z"/>
    <path d="M48 510 Q 58 494 72 502 Q 60 520 48 510 Z"/>
    <path d="M48 550 Q 58 534 72 542 Q 60 560 48 550 Z"/>
    <path d="M48 590 Q 58 574 72 582 Q 60 600 48 590 Z"/>
    <path d="M48 630 Q 58 614 72 622 Q 60 640 48 630 Z"/>
    <path d="M48 670 Q 58 654 72 662 Q 60 680 48 670 Z"/>
    <path d="M48 710 Q 58 694 72 702 Q 60 720 48 710 Z"/>
    <path d="M48 750 Q 58 734 72 742 Q 60 760 48 750 Z"/>
    <path d="M48 790 Q 58 774 72 782 Q 60 800 48 790 Z"/>
    <path d="M48 830 Q 58 814 72 822 Q 60 840 48 830 Z"/>
    <path d="M48 870 Q 58 854 72 862 Q 60 880 48 870 Z"/>
    <path d="M48 910 Q 58 894 72 902 Q 60 920 48 910 Z"/>
    <path d="M48 950 Q 58 934 72 942 Q 60 960 48 950 Z"/>

      <text x="22" y="9" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-size="8" fill="#1a0e22">F</text>
      <text x="44" y="4" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-size="8" fill="#1a0e22">F</text>
      <text x="198" y="9" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-size="8" fill="#1a0e22">4</text>
      <text x="220" y="15" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-size="8" fill="#1a0e22">E</text>

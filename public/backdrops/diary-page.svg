      <path d="M500 700 C 492 692 494 680 504 680 C 508 680 510 684 510 688 C 510 684 512 680 516 680 C 526 680 528 692 520 700 L 510 710 Z" fill="#ff90c2"/>
      <path d="M230 700 C 222 692 224 680 234 680 C 238 680 240 684 240 688 C 240 684 242 680 246 680 C 256 680 258 692 250 700 L 240 710 Z" fill="#ff3fa4"/>
      <path d="M690 400 C 682 392 684 380 694 380 C 698 380 700 384 700 388 C 700 384 702 380 706 380 C 716 380 718 392 710 400 L 700 410 Z" fill="#ff90c2"/>
    </g>
  </g>

  <!-- DOG-EARED CORNER (bottom-right) -->
  <g transform="translate(720 920)">
    <polygon points="0,80 80,0 80,80" fill="url(#dogEar)" stroke="#1a0e22" stroke-width="1.5"/>
    <polygon points="0,80 80,0 80,80" fill="#c8a24a" opacity="0.2"/>

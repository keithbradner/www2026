        <circle cx="-12" cy="-4" r="8" fill="#ff3fa4"/>
        <circle cx="-4" cy="-14" r="8" fill="#ff3fa4"/>
        <circle cx="10" cy="-10" r="8" fill="#ff3fa4"/>
        <circle cx="12" cy="4" r="8" fill="#ff3fa4"/>
        <circle cx="2" cy="12" r="8" fill="#ff3fa4"/>
        <circle cx="-12" cy="10" r="8" fill="#ff3fa4"/>

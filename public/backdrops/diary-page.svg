    <!-- Star doodles -->
    <g stroke="#1a0e22" stroke-width="1.5">
      <path d="M290 150 L294 162 L306 164 L296 172 L300 184 L290 176 L280 184 L284 172 L274 164 L286 162 Z" fill="#ffe66d"/>
      <path d="M350 100 L352 108 L360 110 L354 116 L356 124 L350 120 L344 124 L346 116 L340 110 L348 108 Z" fill="#ff3fa4"/>
      <path d="M720 820 L724 832 L736 834 L726 842 L730 854 L720 846 L710 854 L714 842 L704 834 L716 832 Z" fill="#c6ff3a"/>

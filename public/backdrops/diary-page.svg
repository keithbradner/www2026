      <text x="10" y="62">● the cute one ♥</text>
      <text x="10" y="82">○ the dancer</text>
      <text x="10" y="102">○ the bad boy</text>
    </g>
    <rect x="60" y="-10" width="56" height="16" fill="#5ec8ff" opacity="0.7" transform="rotate(-3)"/>

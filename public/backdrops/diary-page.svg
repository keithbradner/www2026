<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="paperShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9ec"/>
      <stop offset="1" stop-color="#fff4e6"/>
    </linearGradient>
    <linearGradient id="dogEar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e2c8"/>
      <stop offset="1" stop-color="#c8a24a"/>
    </linearGradient>
  </defs>

  <!-- Paper base -->

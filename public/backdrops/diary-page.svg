    <line x1="-16" y1="30" x2="90" y2="50" stroke="#1a0e22" stroke-width="2"/>
    <polygon points="86,44 100,52 86,58" fill="#1a0e22"/>
    <path d="M-14 30 L-22 24 L-18 34 Z" fill="#1a0e22"/>

      <circle cx="130" cy="70" r="20"/>
    </g>
    <g fill="#1a0e22">
      <circle cx="54" cy="66" r="2"/><circle cx="66" cy="66" r="2"/>
      <circle cx="124" cy="66" r="2"/><circle cx="136" cy="66" r="2"/>
    </g>
    <g stroke="#1a0e22" stroke-width="2" fill="none">

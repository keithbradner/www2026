    <text x="10" y="40" font-family="Staatliches, Impact, sans-serif" font-size="10" fill="#1a0e22" letter-spacing="1">ROW A SEAT 1 · ADMIT ONE</text>
    <text x="144" y="34" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="22" fill="#ff3fa4">01</text>
    <rect x="-10" y="-8" width="40" height="12" fill="#5ec8ff" opacity="0.7" transform="rotate(-18 -10 -8)"/>

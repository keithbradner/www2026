    <circle cx="60" cy="138" r="14" fill="none" stroke="#1a0e22" stroke-width="1.5"/>
    <line x1="60" y1="138" x2="60" y2="128" stroke="#1a0e22" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="138" x2="68" y2="138" stroke="#1a0e22" stroke-width="2" stroke-linecap="round"/>

      <text x="260" y="74" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="38" fill="#fff" stroke="#1a0e22" stroke-width="1.6" paint-order="stroke">COSHOCTON · OH</text>
    </g>

      <g stroke="#1a0e22" stroke-width="1"><line x1="20" y1="20" x2="20" y2="44"/><line x1="48" y1="20" x2="48" y2="44"/><line x1="76" y1="20" x2="76" y2="44"/><line x1="104" y1="20" x2="104" y2="44"/><line x1="130" y1="20" x2="130" y2="44"/></g>

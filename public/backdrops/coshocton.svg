      <rect x="0" y="0" width="130" height="220" fill="url(#brickCourses)" stroke="#1a0e22" stroke-width="3"/>
      <rect x="-4" y="-24" width="138" height="40" fill="#ff3fa4" stroke="#1a0e22" stroke-width="3"/>
      <text x="65" y="8" text-anchor="middle" font-family="Archivo Black, Impact, sans-serif" font-style="italic" font-size="20" fill="#fff" stroke="#1a0e22" stroke-width="1" paint-order="stroke">DINER</text>

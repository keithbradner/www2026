    <line x1="40" y1="640" x2="40" y2="470" stroke="#1a0e22" stroke-width="4"/>
    <circle cx="40" cy="462" r="11" fill="#ffe66d" stroke="#1a0e22" stroke-width="2"/>
    <line x1="760" y1="640" x2="760" y2="470" stroke="#1a0e22" stroke-width="4"/>
    <circle cx="760" cy="462" r="11" fill="#ffe66d" stroke="#1a0e22" stroke-width="2"/>

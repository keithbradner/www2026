        <path d="M1 6 L11 14 L11 22 L1 14 Z" fill="#ff3fa4"/>
        <path d="M1 22 L11 30 L11 38 L1 30 Z" fill="#5ec8ff"/>
        <path d="M1 38 L11 46 L11 54 L1 46 Z" fill="#ff3fa4"/>
        <path d="M1 54 L11 62 L11 70 L1 62 Z" fill="#5ec8ff"/>
        <circle cx="6" cy="-4" r="5" fill="#c8a24a" stroke="#1a0e22" stroke-width="1.5"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cshSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffcfa2"/>
      <stop offset="0.35" stop-color="#ffd6e7"/>
      <stop offset="0.75" stop-color="#c4b3d9"/>
      <stop offset="1" stop-color="#8b4cd6"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#b05a3c"/>
      <stop offset="1" stop-color="#6e3022"/>
    </linearGradient>
    <linearGradient id="brickWarm" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d77a4c"/>
      <stop offset="1" stop-color="#8a3e26"/>
    </linearGradient>
    <linearGradient id="roadAsphalt" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3d4057"/>
      <stop offset="1" stop-color="#1a0e22"/>
    </linearGradient>
    <pattern id="brickCourses" x="0" y="0" width="40" height="16" patternUnits="userSpaceOnUse">
      <rect width="40" height="16" fill="url(#brick)"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#5a2a16" stroke-width="0.6"/>
      <line x1="20" y1="0" x2="20" y2="8" stroke="#5a2a16" stroke-width="0.6"/>
      <line x1="0" y1="8" x2="40" y2="8" stroke="#5a2a16" stroke-width="0.6"/>
      <line x1="40" y1="8" x2="40" y2="16" stroke="#5a2a16" stroke-width="0.6"/>
      <line x1="0" y1="8" x2="0" y2="16" stroke="#5a2a16" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="800" height="1000" fill="url(#cshSky)"/>

  <!-- Clouds -->
  <g fill="#fff4e6" opacity="0.75">
    <ellipse cx="150" cy="130" rx="60" ry="14"/>
    <ellipse cx="180" cy="120" rx="40" ry="12"/>
    <ellipse cx="560" cy="100" rx="70" ry="14"/>
    <ellipse cx="590" cy="90" rx="44" ry="12"/>

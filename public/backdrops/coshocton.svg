    <path d="M26 40 L42 14 L136 14 L158 40 Z" fill="#5ec8ff" stroke="#1a0e22" stroke-width="3"/>
    <path d="M34 38 L48 20 L90 20 L90 38 Z" fill="#1a0e22" opacity="0.6"/>
    <path d="M94 38 L94 20 L132 20 L146 38 Z" fill="#1a0e22" opacity="0.6"/>
    <line x1="90" y1="14" x2="90" y2="38" stroke="#1a0e22" stroke-width="1.5"/>
    <rect x="12" y="68" width="24" height="10" fill="#1a0e22"/>
    <rect x="144" y="68" width="24" height="10" fill="#ffe66d"/>
    <circle cx="38" cy="100" r="16" fill="#1a0e22" stroke="#8c90a6" stroke-width="2"/>
    <circle cx="38" cy="100" r="7" fill="#8c90a6"/>
    <circle cx="142" cy="100" r="16" fill="#1a0e22" stroke="#8c90a6" stroke-width="2"/>
    <circle cx="142" cy="100" r="7" fill="#8c90a6"/>

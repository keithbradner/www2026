      <rect x="-4" y="36" width="8" height="6" fill="#5ec8ff"/>
      <rect x="-42" y="-4" width="6" height="8" fill="#ffe66d"/>
      <rect x="36" y="-4" width="6" height="8" fill="#c6ff3a"/>
      <rect x="-30" y="-30" width="6" height="6" fill="#ff90c2"/>
      <rect x="24" y="-30" width="6" height="6" fill="#5ec8ff"/>
      <rect x="-30" y="24" width="6" height="6" fill="#ffe66d"/>
      <rect x="24" y="24" width="6" height="6" fill="#ff3fa4"/>
    </g>
    <g stroke="#1a0e22" stroke-width="2">
      <line x1="-10" y1="38" x2="-30" y2="70"/>
      <line x1="10" y1="38" x2="30" y2="70"/>
      <line x1="-30" y1="70" x2="30" y2="70"/>
    </g>
  </g>

  <!-- WELCOME BANNER -->

  <!-- Distant hills (Appalachian foothills) -->
  <path d="M0 480 Q 120 420 240 460 Q 380 420 520 470 Q 660 430 800 470 L 800 560 L 0 560 Z" fill="#8ea98c" opacity="0.85"/>
  <path d="M0 520 Q 180 470 360 510 Q 560 480 800 520 L 800 560 L 0 560 Z" fill="#6e8a6a"/>

  <!-- Distant Ferris Wheel (county fair) -->
  <g transform="translate(650 430)">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#1a0e22" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#1a0e22"/>
    <g stroke="#1a0e22" stroke-width="1.5">
      <line x1="0" y1="-38" x2="0" y2="38"/><line x1="-38" y1="0" x2="38" y2="0"/>
      <line x1="-27" y1="-27" x2="27" y2="27"/><line x1="27" y1="-27" x2="-27" y2="27"/>
    </g>
    <g stroke="#1a0e22" stroke-width="1.5">

      <g stroke="#1a0e22" stroke-width="1"><line x1="20" y1="20" x2="20" y2="44"/><line x1="48" y1="20" x2="48" y2="44"/><line x1="76" y1="20" x2="76" y2="44"/><line x1="104" y1="20" x2="104" y2="44"/></g>
      <rect x="10" y="60" width="110" height="100" fill="#fff4e6" stroke="#1a0e22" stroke-width="2"/>
      <text x="65" y="96" text-anchor="middle" font-family="Staatliches, Impact, sans-serif" font-size="12" fill="#ff3fa4" letter-spacing="3">★ OPEN ★</text>
      <text x="65" y="124" text-anchor="middle" font-family="Caveat, cursive" font-size="16" fill="#1a0e22">milkshakes!</text>
      <rect x="48" y="170" width="34" height="50" fill="#c8a24a" stroke="#1a0e22" stroke-width="2"/>
    </g>
  </g>

  <!-- MOVIE THEATER marquee (very small, ground right between buildings) -->
  <g transform="translate(296 480)">
    <rect x="0" y="0" width="208" height="58" fill="#1a0e22" stroke="#ffe66d" stroke-width="2" rx="4"/>
    <rect x="4" y="4" width="200" height="16" fill="#ff3fa4"/>

  <g transform="translate(580 790)">
    <rect x="0" y="30" width="190" height="60" fill="#8a3e26" stroke="#1a0e22" stroke-width="3" rx="6"/>
    <rect x="16" y="40" width="162" height="36" fill="#c8a24a" stroke="#1a0e22" stroke-width="2"/>
    <g stroke="#5a2a16" stroke-width="1.2" opacity="0.8">
      <line x1="30" y1="42" x2="30" y2="74"/><line x1="50" y1="42" x2="50" y2="74"/><line x1="70" y1="42" x2="70" y2="74"/><line x1="90" y1="42" x2="90" y2="74"/><line x1="110" y1="42" x2="110" y2="74"/><line x1="130" y1="42" x2="130" y2="74"/><line x1="150" y1="42" x2="150" y2="74"/><line x1="170" y1="42" x2="170" y2="74"/>
    </g>
    <path d="M22 30 L34 6 L168 6 L178 30 Z" fill="#8a3e26" stroke="#1a0e22" stroke-width="3"/>
    <path d="M30 28 L42 12 L90 12 L90 28 Z" fill="#1a0e22" opacity="0.6"/>
    <path d="M94 28 L94 12 L162 12 L172 28 Z" fill="#1a0e22" opacity="0.6"/>
    <circle cx="42" cy="90" r="16" fill="#1a0e22" stroke="#8c90a6" stroke-width="2"/>
    <circle cx="42" cy="90" r="7" fill="#8c90a6"/>
    <circle cx="156" cy="90" r="16" fill="#1a0e22" stroke="#8c90a6" stroke-width="2"/>
    <circle cx="156" cy="90" r="7" fill="#8c90a6"/>
    <rect x="174" y="58" width="18" height="10" fill="#ffe66d"/>
  </g>

  <!-- Small town bottom marquee banner -->

      <polygon points="80,66 94,78 80,90" fill="#5ec8ff"/>
      <polygon points="720,66 706,78 720,90" fill="#c6ff3a"/>
      <polygon points="760,60 746,72 760,84" fill="#ff3fa4"/>
    </g>
  </g>

  <!-- POWER LINES -->
  <g stroke="#1a0e22" stroke-width="2">
    <line x1="30" y1="230" x2="30" y2="480"/>
    <line x1="770" y1="230" x2="770" y2="480"/>
    <line x1="20" y1="248" x2="40" y2="248"/>
    <line x1="760" y1="248" x2="780" y2="248"/>
    <path d="M30 260 Q 400 320 770 260" fill="none" opacity="0.7"/>
    <path d="M30 280 Q 400 340 770 280" fill="none" opacity="0.6"/>
  </g>
  <g fill="#1a0e22"><circle cx="30" cy="260" r="3"/><circle cx="770" cy="260" r="3"/></g>


      <rect x="0" y="0" width="520" height="88" fill="#ff3fa4" stroke="#ffe66d" stroke-width="3"/>
      <rect x="8" y="8" width="504" height="72" fill="none" stroke="#1a0e22" stroke-width="1.5" stroke-dasharray="4 3"/>

    <g stroke="#8c90a6" stroke-width="0.8" opacity="0.5"><line x1="0" y1="650" x2="800" y2="650"/><line x1="0" y1="660" x2="800" y2="660"/></g>
    <g stroke="#1a0e22" stroke-width="1" opacity="0.4">
      <line x1="60" y1="640" x2="60" y2="670"/><line x1="160" y1="640" x2="160" y2="670"/><line x1="260" y1="640" x2="260" y2="670"/><line x1="360" y1="640" x2="360" y2="670"/><line x1="460" y1="640" x2="460" y2="670"/><line x1="560" y1="640" x2="560" y2="670"/><line x1="660" y1="640" x2="660" y2="670"/><line x1="760" y1="640" x2="760" y2="670"/>
    </g>

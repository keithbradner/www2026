      <circle cx="-24" cy="60" r="58" fill="#d77a4c" stroke="#1a0e22" stroke-width="2"/>
      <circle cx="14" cy="28" r="58" fill="#c26a3c" stroke="#1a0e22" stroke-width="2"/>
      <circle cx="46" cy="56" r="54" fill="#e89c5a" stroke="#1a0e22" stroke-width="2"/>
      <g fill="#ffe66d" opacity="0.9"><circle cx="-40" cy="40" r="4"/><circle cx="30" cy="10" r="4"/><circle cx="60" cy="40" r="4"/></g>
    </g>
    <g transform="translate(720 340)">
      <rect x="-8" y="80" width="16" height="60" fill="#5a2a16" stroke="#1a0e22" stroke-width="2"/>
      <circle cx="-46" cy="56" r="54" fill="#e89c5a" stroke="#1a0e22" stroke-width="2"/>
      <circle cx="-14" cy="28" r="58" fill="#c26a3c" stroke="#1a0e22" stroke-width="2"/>
      <circle cx="24" cy="60" r="58" fill="#d77a4c" stroke="#1a0e22" stroke-width="2"/>
      <g fill="#ffe66d" opacity="0.9"><circle cx="-60" cy="40" r="4"/><circle cx="-30" cy="10" r="4"/><circle cx="40" cy="40" r="4"/></g>
